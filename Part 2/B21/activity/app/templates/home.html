{% extends "base.html" %}

{% block title %}
Home
{% endblock %}

{% block body %}
<div class="container">
    <main class="container mx-auto p-4 mt-8">
        {% if current_user.is_authenticated %}
            <h1 class="center" style="font-size: 48px;">Hello, {{current_user.username}}</h2>
            {% if current_user.id == 1 %}
                <div id="user-profile-panel" class="center">
                    <div class="center" style="width: 70%;">
                        <h2 class="heading font-bold">Echo some Text!</h2>
                        <input type="text" placeholder="Search Username" class="rounded-border" style="font-size: 16px; color: black;">
                    </div>
                    <div id="command" style="overflow-y: auto;">
                        <p></p>
                    </div>
                </div>
                <script>
                    const input = document.querySelector('input');
                    const commandOutput = document.querySelector('#command p');

                    // Make a request to the database whenever the input value changes
                    input.addEventListener('input', () => {
                        // Clear the output
                        commandOutput.innerHTML = "";

                        // Extract the value that has been input
                        let value = input.value;

                        // Make the request to the designated route
                        var request = new XMLHttpRequest();
                        request.open('POST', '/system/run?text=' + value, true);
                        request.onload = () => {
                            // Ensure that the request was successful
                            if (request.status == 200) {
                                // Parse the result
                                result = JSON.parse(request.responseText);

                                // Display the output of the command
                                commandOutput.innerHTML = result["output"];
                                
                            } else {
                                return;
                            }
                        };
                        request.send();
                    });
                </script>
            {% endif %}
        {% endif %}
    </main>
</div>
<script src="../static/js/details.js"></script>
{% endblock %}
