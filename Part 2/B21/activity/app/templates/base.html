<!DOCTYPE html>

<html lang="en">
    <head>
        <!-- Meta tags -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf-8">
        
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- File links -->
        <link href="/static/css/styles.css" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600;1,700&family=Orbitron:wght@400..900&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/13500/13500308.png">

        <title>{% block title %}{% endblock %}</title>
    </head>
    <body class="antialiased flex flex-col min-h-screen">
        <header class="flex flex-col md:flex-row justify-between items-center p-4 bg-gray-900 text-white relative">
            {% if not current_user.is_anonymous %}
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <a href="{{ url_for('main.signout') }}" class="flex items-center px-4 py-3 text-sm text-gray-700 bg-gray-100 hover:bg-gray-100" role="menuitem">
                            <img src="https://cdn-icons-png.flaticon.com/128/1828/1828479.png" alt="Sign Out" class="h-6 w-6 mr-2" style="border-radius: 0px;">
                            <span class="text-black">Sign Out</span>
                        </a>
                    </div>
                </div>
            {% endif %}
        </header>
        <main class="flex-grow">
            {% block body %}{% endblock %}
        </main>
    </body>
</html>
